    </button>
    <div class="more-works-dropdown" id="moreWorksDropdown">

        <button class="close-btn" onclick="toggleMoreWorks()" aria-label="Close more works">

      </div>

    </div>

          <figcaption class="has-text-centered" id="teaser-caption"></figcaption>
        </figure>
      </div>
    </section>

    <div id="sections-container"></div>

    <section class="section bibtex-section" id="BibTeX">
      <div class="container is-max-desktop content">
        <div class="bibtex-header">
          <h2 class="title is-3">BibTeX</h2>
          <button class="copy-bibtex-btn" onclick="copyBibTeX()" title="Copy BibTeX to clipboard">
            <i class="fas fa-copy"></i>
            <span class="copy-text">Copy</span>
          </button>
        </div>
        <pre><code id="bibtex-code"></code></pre>
